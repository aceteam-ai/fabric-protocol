syntax = "proto3";

// Node activity telemetry (citadel#294, shipped transport via aceteam #4139).
// Brought under the proto source-of-truth for codegen + drift-prevention.
// NOTE: the live #4139 wire transport is flat JSON over Redis and is NOT being
// changed -- this message documents/codegens that existing shape. Only NEW
// surfaces (node_state) go binary.
package aceteam.fabric.v1;

option go_package = "github.com/aceteam-ai/fabric-protocol/gen/go/aceteam/fabric/v1;fabricv1";

import "google/protobuf/timestamp.proto";

enum ActivityLevel {
  ACTIVITY_LEVEL_UNSPECIFIED = 0;
  ACTIVITY_LEVEL_INFO    = 1;
  ACTIVITY_LEVEL_SUCCESS = 2;
  ACTIVITY_LEVEL_WARNING = 3;
  ACTIVITY_LEVEL_ERROR   = 4;
}

// Emitted by citadel-cli to Redis stream `node:activity:stream`; drained by the
// NodeActivityWorker into Supabase `node_activity_events`. org_id is re-derived
// server-side from the Headscale hostname (node-reported org is ignored).
message NodeActivity {
  string node_id = 1;   // Headscale hostname = auth key
  string version = 2;   // citadel-cli version
  ActivityLevel level = 3;
  string message = 4;
  google.protobuf.Timestamp event_ts = 5;
}
